<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>قائمة انتظار المرضى</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;800;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
<style>
  :root{
    --bg:#F2F8FB;
    --surface:#FFFFFF;
    --surface-soft:#F3F9FC;
    --ink:#0F2E3D;
    --ink-soft:#5C7C8C;
    --ink-faint:#9CB8C4;
    --line:#DCEBF2;
    --brand:#3E86B5;
    --brand-2:#5AA6CF;
    --brand-dark:#2C6A93;
    --brand-tint:#E2F0F8;
    --emergency:#D8503E;
    --emergency-bg:#FCEBE8;
    --normal:#3E93A8;
    --normal-bg:#E4F2F6;
    --done:#93A9B4;
    --done-bg:#EEF4F6;
    --gauge2:#8558C7;
    --radius:14px;
    --shadow:0 1px 2px rgba(15,46,61,0.05), 0 8px 24px -12px rgba(15,46,61,0.16);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"IBM Plex Sans Arabic","Tajawal",sans-serif;
    direction:rtl;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  /* ===== Page layout: full-height sidebar + main column ===== */
  .page{display:flex;flex-direction:row;min-height:100vh;}

  .sidebar{
    width:230px;flex:0 0 230px;min-height:100vh;
    background:linear-gradient(180deg,#2D3A80 0%, #1F2A63 100%);
    color:#fff;display:flex;flex-direction:column;padding:22px 14px;gap:4px;
  }
  .sidebar-logo{text-align:center;margin-bottom:20px;}
  .sidebar-logo img{width:100%;max-width:186px;height:auto;}
  .sidebar .nav-label{
    font-size:10.5px;color:rgba(255,255,255,0.45);font-weight:700;letter-spacing:.04em;
    padding:2px 12px 8px;
  }
  .side-btn{
    display:flex;align-items:center;gap:10px;width:100%;text-align:right;
    background:transparent;border:none;border-right:3px solid transparent;color:rgba(255,255,255,0.82);
    padding:11px 13px;border-radius:9px;font-family:inherit;font-size:14px;font-weight:600;
    cursor:pointer;transition:background .15s, border-color .15s;
  }
  .side-btn:hover{background:rgba(255,255,255,0.08);}
  .side-btn.active{background:rgba(255,255,255,0.16);color:#fff;border-right-color:#fff;}
  .side-btn .ic{width:17px;height:17px;flex:0 0 auto;opacity:.9;}

  .credit-badge{
    margin-top:auto;
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.16);
    border-radius:12px;
    padding:11px 13px;
  }
  .credit-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px;}
  .credit-row .cname{font-size:12.5px;font-weight:700;color:#fff;}
  .credit-row .clabel{font-size:9.5px;font-style:italic;color:rgba(255,255,255,0.5);letter-spacing:.02em;}
  .credit-phone{
    margin-top:6px;text-align:center;font-family:"IBM Plex Mono",monospace;
    font-size:11px;color:rgba(255,255,255,0.65);letter-spacing:.03em;
  }

  /* ===== Main column ===== */
  .main-col{flex:1;min-width:0;display:flex;flex-direction:column;}
  .main-header{
    background:var(--surface);border-bottom:1px solid var(--line);
    padding:16px 28px;text-align:center;
  }
  .main-header h1{font-family:"Tajawal",sans-serif;font-weight:800;font-size:17px;margin:0;color:var(--ink);}
  .main-header .today{font-size:10.5px;color:var(--ink-faint);margin-top:2px;}

  .identity-card{
    max-width:820px;margin:18px auto 0;
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:14px 24px;
  }
  .identity-card .cap{
    font-size:11px;font-weight:700;color:var(--ink-soft);letter-spacing:.03em;
    text-align:center;margin-bottom:10px;
  }
  .identity-fields{display:flex;justify-content:center;}
  .identity-field{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    flex:1;max-width:230px;padding:0 18px;
    border-right:1px solid var(--line);
  }
  .identity-field:first-child{border-right:none;}
  .identity-field label{font-size:10.5px;color:var(--ink-faint);font-weight:600;}
  .identity-field input{
    border:none;border-bottom:1.5px solid var(--line);background:transparent;
    text-align:center;font-family:inherit;font-size:13.5px;font-weight:600;color:var(--brand-dark);
    padding:3px 6px;width:100%;transition:border-color .15s;
  }
  .identity-field input:focus{outline:none;border-color:var(--brand-2);}
  .identity-field input::placeholder{color:var(--ink-faint);font-weight:400;}

  .main{flex:1;min-width:0;padding:22px 30px 60px;}
  @keyframes fadeInUp{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
  .main{animation:fadeInUp .25s ease;}

  .view-head{margin-bottom:20px;}
  .view-head h2{font-family:"Tajawal",sans-serif;font-size:21px;font-weight:800;margin:0 0 4px;}
  .view-head .meta{font-size:13px;color:var(--ink-soft);}

  .btn{
    font-family:inherit;font-weight:600;font-size:14px;border-radius:10px;padding:11px 18px;
    border:none;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:transform .1s;
  }
  .btn:active{transform:scale(0.97);}
  .btn:disabled{opacity:.6;cursor:default;transform:none;}
  .btn-primary{background:var(--brand);color:#fff;}
  .btn-primary:hover{background:var(--brand-2);}
  .btn-outline{background:#fff;color:var(--brand);border:1px solid var(--line);}
  .btn-outline:hover{border-color:var(--brand-2);}
  .btn-danger{background:var(--emergency);color:#fff;}
  .btn-danger:hover{background:#c2452f;}
  .btn-sm{padding:8px 13px;font-size:13px;border-radius:9px;}

  /* ===== Dashboard ===== */
  .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px;}
  .stat-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;}
  .stat-card .num{font-family:"IBM Plex Mono",monospace;font-size:26px;font-weight:600;color:var(--brand);line-height:1;}
  .stat-card .num.warn{color:var(--emergency);}
  .stat-card .lbl{font-size:12px;color:var(--ink-soft);margin-top:6px;font-weight:600;}

  .gauge-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px;}
  .gauge-card{
    flex:1;min-width:220px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:20px;text-align:center;
  }
  .gauge-card .cap{font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:10px;}
  .gauge-card .sub{font-size:12px;color:var(--ink-soft);margin-top:8px;}

  /* ===== Search / list ===== */
  .toolbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .search-box{position:relative;flex:1;min-width:220px;max-width:340px;}
  .search-box input{
    width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 14px;
    font-family:inherit;font-size:13.5px;color:var(--ink);background:var(--surface);
  }
  .search-box input:focus{outline:2px solid var(--brand-2);outline-offset:1px;}
  .toolbar-actions{display:flex;gap:8px;flex-wrap:wrap;}

  .section-title{font-size:12.5px;font-weight:700;color:var(--ink-soft);letter-spacing:.03em;margin:24px 0 10px 2px;}
  .section-title:first-child{margin-top:0;}
  .load-more-row{display:flex;justify-content:center;margin-top:12px;}

  /* ===== Ticket list ===== */
  .ticket{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);display:flex;align-items:stretch;margin-bottom:10px;overflow:hidden;
  }
  .ticket.emergency{box-shadow:var(--shadow), inset 3px 0 0 var(--emergency);}
  .ticket.done{opacity:.65;}
  .ticket-stub{
    flex:0 0 74px;background:var(--surface-soft);border-left:1.5px dashed var(--line);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:10px 4px;
  }
  .ticket-num{font-family:"IBM Plex Mono",monospace;font-size:22px;font-weight:600;color:var(--brand);line-height:1;}
  .ticket-num-label{font-size:9.5px;color:var(--ink-faint);font-weight:500;}
  .ticket-body{flex:1;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;min-width:0;}
  .ticket-info{min-width:0;}
  .ticket-name{font-size:15.5px;font-weight:700;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ticket-sub{font-size:12.5px;color:var(--ink-soft);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .dot{width:3px;height:3px;border-radius:50%;background:var(--ink-faint);flex:0 0 auto;}
  .mono{font-family:"IBM Plex Mono",monospace;font-weight:600;}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;flex:0 0 auto;}
  .badge.emergency{background:var(--emergency-bg);color:var(--emergency);}
  .badge.normal{background:var(--normal-bg);color:var(--normal);}
  .badge.done{background:var(--done-bg);color:var(--done);}
  .ticket-actions{display:flex;align-items:center;gap:6px;flex:0 0 auto;}
  .icon-btn{
    width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:#fff;
    display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-soft);transition:.15s;
  }
  .icon-btn:hover{border-color:var(--brand-2);color:var(--brand-2);}
  .icon-btn.finish{color:var(--brand);}
  .icon-btn.finish:hover{background:var(--brand-tint);border-color:var(--brand);}
  .icon-btn.undo{color:#C4832A;}
  .icon-btn.undo:hover{background:#FBF1E1;border-color:#C4832A;}
  .icon-btn.remove:hover{background:var(--emergency-bg);border-color:var(--emergency);color:var(--emergency);}
  .icon-btn svg{width:16px;height:16px;}

  .empty-state{
    background:var(--surface);border:1px dashed var(--line);border-radius:var(--radius);
    padding:44px 24px;text-align:center;color:var(--ink-soft);
  }
  .empty-state .big{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px;}
  .empty-state .small{font-size:13px;}

  /* ===== Log table ===== */
  .data-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .data-table th{
    text-align:right;font-size:11.5px;color:var(--ink-soft);font-weight:700;
    padding:11px 14px;background:var(--surface-soft);border-bottom:1px solid var(--line);white-space:nowrap;
  }
  .data-table td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--line);vertical-align:middle;}
  .data-table tr:last-child td{border-bottom:none;}
  .data-table .detail-cell{color:var(--ink-soft);font-size:12.5px;}
  .log-clear-row{margin-top:18px;text-align:center;}
  .log-clear-note{font-size:11.5px;color:var(--ink-faint);margin-top:8px;}

  /* ===== Modal ===== */
  .overlay{
    position:fixed;inset:0;background:rgba(15,46,61,0.45);display:none;
    align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .overlay.show{display:flex;}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:440px;padding:26px;box-shadow:0 24px 60px -12px rgba(15,46,61,0.35);}
  .modal h2{font-family:"Tajawal",sans-serif;font-size:19px;font-weight:800;margin:0 0 18px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
  .field input{
    width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;
    font-family:inherit;font-size:14px;color:var(--ink);background:var(--surface-soft);
  }
  .field input:focus{outline:2px solid var(--brand-2);outline-offset:1px;background:#fff;}
  .field-row{display:flex;gap:10px;}
  .field-row .field{flex:1;}
  .priority-options{display:flex;gap:8px;}
  .priority-opt{
    flex:1;text-align:center;padding:9px 4px;border-radius:9px;border:1.5px solid var(--line);
    font-size:13px;font-weight:600;cursor:pointer;color:var(--ink-soft);
  }
  .priority-opt.sel-normal.selected{border-color:var(--normal);background:var(--normal-bg);color:var(--normal);}
  .priority-opt.sel-emergency.selected{border-color:var(--emergency);background:var(--emergency-bg);color:var(--emergency);}
  .modal-actions{display:flex;gap:8px;margin-top:20px;}
  .modal-actions .btn{flex:1;justify-content:center;}
  .modal-head{display:flex;justify-content:space-between;align-items:center;}
  .x-btn{background:none;border:none;cursor:pointer;color:var(--ink-faint);font-size:20px;line-height:1;padding:4px;}
  .confirm-text{font-size:14px;color:var(--ink-soft);line-height:1.7;margin-bottom:4px;}
  .confirm-text strong{color:var(--ink);}

  .loading-note{padding:60px;text-align:center;color:var(--ink-soft);font-size:14px;}

  /* ===== PDF export capture area (off-screen) ===== */
  #exportArea{
    position:fixed; top:0; left:-10000px; width:760px; background:#fff; padding:26px 30px;
    font-family:"IBM Plex Sans Arabic",sans-serif; direction:rtl;
  }
  .export-head{text-align:center;border-bottom:2px solid #223;padding-bottom:12px;margin-bottom:14px;}
  .export-head h1{font-size:19px;margin:0 0 5px;font-family:"Tajawal",sans-serif;}
  .export-head .meta{font-size:12.5px;color:#444;}
  .export-table{width:100%;border-collapse:collapse;font-size:12.5px;}
  .export-table th, .export-table td{border:1px solid #a9b8c0;padding:7px 9px;text-align:right;}
  .export-table th{background:#eef4f7;}
  .export-summary{margin-top:16px;font-size:13px;border-top:1px solid #a9b8c0;padding-top:10px;display:flex;gap:26px;flex-wrap:wrap;}
  .export-summary b{font-family:"IBM Plex Mono",monospace;}
  .export-footer{margin-top:22px;font-size:10.5px;color:#666;text-align:center;}

  ::-webkit-scrollbar{width:8px;height:8px;}
  .sidebar ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:8px;}
</style>
</head>

    ],
    auditLog: [],
  };
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){ /* أول استخدام على هذا الجهاز */ }
  const fresh = seedState();
  saveState(fresh);
  return fresh;
}
function saveState(s){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
  }catch(e){
    console.error('تعذر الحفظ محليًا على هذا الجهاز', e);
    alert('تعذر حفظ البيانات على هذا الجهاز. تأكد أن المتصفح يسمح بالتخزين المحلي (غير في وضع التصفح الخفي).');
  }
}
function logAction(action, detail){
  state.auditLog.unshift({ id: 'a'+Date.now()+Math.random().toString(36).slice(2,6), ts: Date.now(), action, detail });
  saveState(state);
}

function fmtDate(ts){
  return new Date(ts).toLocaleDateString('ar-SA-u-ca-gregory', { day:'numeric', month:'short', year:'numeric' });
}
function fmtDateTime(ts){
  const d = new Date(ts);
  return d.toLocaleDateString('ar-SA-u-ca-gregory', { day:'numeric', month:'short', year:'numeric' }) + ' — ' + d.toLocaleTimeString('ar-SA', { hour:'2-digit', minute:'2-digit' });
}
function weekStart(){
  const now = new Date();
  const d = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  d.setDate(d.getDate() - d.getDay());
  return d.getTime();
}
function monthStart(){
  const now = new Date();
  return new Date(now.getFullYear(), now.getMonth(), 1).getTime();
}
function completionStats(sinceTs){
  const completed = state.patients.filter(p => p.status==='done' && p.completedAt && p.completedAt>=sinceTs).length;
  const waiting = state.patients.filter(p => p.status==='waiting').length;
  const denom = completed + waiting;
  const pct = denom>0 ? Math.round((completed/denom)*100) : 0;
  return { completed, waiting, pct };
}
function matchesSearch(p, q){
  if(!q) return true;
  const norm = s => (s||'').toString().toLowerCase();
  const query = norm(q);
  return norm(p.name).includes(query) || norm(p.fileNumber).includes(query) || norm(p.nationalId).includes(query);
}
function activePatients(){
  return state.patients.filter(p => p.status==='waiting' && matchesSearch(p, searchQuery))
    .sort((a,b) => (PRIORITY_ORDER[a.priority]-PRIORITY_ORDER[b.priority]) || (a.addedAt-b.addedAt));
}
function donePatients(){
  return state.patients.filter(p => p.status==='done' && matchesSearch(p, searchQuery))
    .sort((a,b) => (b.completedAt||b.addedAt) - (a.completedAt||a.addedAt));
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}
function gaugeSVG(pct, color, size, stroke){
  size = size || 130; stroke = stroke || 13;
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (Math.min(100,Math.max(0,pct)) / 100) * c;
  const cx = size/2, cy = size/2;
  return `
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#E7EFF2" stroke-width="${stroke}"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
        stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${offset}"
        transform="rotate(-90 ${cx} ${cy})" style="transition:stroke-dashoffset .4s;"/>
      <text x="50%" y="50%" text-anchor="middle" dominant-baseline="central"
        font-family="IBM Plex Mono, monospace" font-size="24" font-weight="600" fill="${color}">${pct}%</text>
    </svg>`;
}

  return `
    <div class="view-head">
      <h2>لوحة التحكم</h2>
      <div class="meta">نظرة سريعة على قائمة الانتظار ونسب الإنجاز</div>
    </div>
    <div class="stat-row">
      <div class="stat-card"><div class="num">${waitingNow}</div><div class="lbl">المتبقي في قائمة الانتظار</div></div>
      <div class="stat-card"><div class="num warn">${urgentNow}</div><div class="lbl">حالات طارئة الآن</div></div>
      <div class="stat-card"><div class="num">${state.patients.filter(p=>p.status==='done').length}</div><div class="lbl">إجمالي المكتملين (الكل)</div></div>
    </div>
    <div class="gauge-row">
      <div class="gauge-card">
        <div class="cap">نسبة الإنجاز الأسبوعي</div>
        ${gaugeSVG(weekly.pct, 'var(--brand)')}
        <div class="sub">${weekly.completed} مكتمل من أصل ${weekly.completed + weekly.waiting}</div>
      </div>
      <div class="gauge-card">
        <div class="cap">نسبة الإنجاز الشهري</div>
        ${gaugeSVG(monthly.pct, 'var(--gauge2)')}
        <div class="sub">${monthly.completed} مكتمل من أصل ${monthly.completed + monthly.waiting}</div>
      </div>
    </div>
  `;
}

function renderClinic(){
  const allActive = activePatients();
  const allDone = donePatients();
  const active = allActive.slice(0, visibleActiveCount);
  const done = allDone.slice(0, visibleDoneCount);

  const ticketsHtml = active.length ? active.map((p,i) => ticketRow(p, i+1)).join('') : `
    <div class="empty-state">
      <div class="big">${searchQuery ? 'لا توجد نتائج مطابقة للبحث' : 'لا يوجد مرضى في قائمة الانتظار حاليًا'}</div>
      <div class="small">${searchQuery ? 'جرّب اسمًا أو رقم ملف آخر' : 'اضغط "إضافة مريض" لتسجيل أول حالة'}</div>
    </div>`;

  const loadMoreActive = allActive.length > visibleActiveCount ? `
    <div class="load-more-row"><button class="btn btn-outline btn-sm" id="loadMoreActive">عرض ${Math.min(PAGE_STEP, allActive.length - visibleActiveCount)} إضافية (المتبقي ${allActive.length - visibleActiveCount})</button></div>
  ` : '';

  const doneHtml = allDone.length ? `
    <div class="section-title">المكتملون (${allDone.length})</div>
    ${done.map(p => ticketRow(p, null)).join('')}
    ${allDone.length > visibleDoneCount ? `<div class="load-more-row"><button class="btn btn-outline btn-sm" id="loadMoreDone">عرض المزيد (المتبقي ${allDone.length - visibleDoneCount})</button></div>` : ''}
  ` : '';

  return `
    <div class="view-head">
      <h2>العيادة</h2>
      <div class="meta">${allActive.length} مريض في قائمة الانتظار</div>
    </div>
    <div class="toolbar">
      <div class="search-box">
        <input type="text" id="searchInput" value="${escapeHtml(searchQuery)}" placeholder="ابحث بالاسم، رقم الملف، أو رقم الهوية…">
      </div>
      <div class="toolbar-actions">
        <button class="btn btn-outline" id="exportPdfBtn">${icon('pdf')} تصدير PDF</button>
        <button class="btn btn-primary" id="openAddPatient">+ إضافة مريض</button>
      </div>
    </div>
    <div class="section-title">قائمة الانتظار</div>
    ${ticketsHtml}
    ${loadMoreActive}
    ${doneHtml}
  `;
}

function renderLog(){
  const rows = state.auditLog.slice(0, 500).map(entry => `
    <tr>
      <td class="mono" style="white-space:nowrap;">${fmtDateTime(entry.ts)}</td>
      <td>${escapeHtml(ACTION_LABELS[entry.action] || entry.action)}</td>
      <td class="detail-cell">${escapeHtml(entry.detail || '')}</td>
    </tr>
  `).join('');

  return `
    <div class="view-head">
      <h2>سجل الحركات</h2>
      <div class="meta">سجل تلقائي لكل عملية إضافة، إكمال، تراجع، أو حذف تمت على هذا الجهاز</div>
    </div>
    ${state.auditLog.length === 0 ? `<div class="empty-state"><div class="big">لا توجد حركات مسجلة بعد</div></div>` : `
    <table class="data-table">
      <thead><tr><th>الوقت</th><th>الحركة</th><th>التفاصيل</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="log-clear-row">
      <button class="btn btn-danger btn-sm" id="clearLogBtn">حذف كل سجل الحركات نهائيًا</button>
      <div class="log-clear-note">هذا يحذف سجل الحركات فقط — بيانات المرضى (المنتظرين والمكتملين) لا تتأثر إطلاقًا.</div>
    </div>`}
  `;
}

function ticketRow(p, position){
  const clsPriority = p.priority === 'emergency' ? 'emergency' : '';
  const isDone = p.status === 'done';
  const badgeClass = isDone ? 'done' : p.priority;
  const badgeLabel = isDone ? 'تم' : PRIORITY_LABEL[p.priority];
  const numDisplay = position ? String(position).padStart(2,'0') : '—';

  let actions = '';
  if(!isDone){
    actions += `<button class="icon-btn finish" title="تعليم كمكتمل" data-action="finish" data-id="${p.id}">${icon('finish')}</button>`;
  } else {
    actions += `<button class="icon-btn undo" title="إعادة لقائمة الانتظار" data-action="undo" data-id="${p.id}">${icon('undo')}</button>`;
  }
  actions += `<button class="icon-btn remove" title="حذف نهائي" data-action="remove" data-id="${p.id}" data-name="${escapeHtml(p.name)}">${icon('remove')}</button>`;

  return `
    <div class="ticket ${clsPriority} ${isDone?'done':''}">
      <div class="ticket-stub">
        <div class="ticket-num">${numDisplay}</div>
        <div class="ticket-num-label">الترتيب</div>
      </div>
      <div class="ticket-body">
        <div class="ticket-info">
          <div class="ticket-name">${escapeHtml(p.name)}</div>
          <div class="ticket-sub">
            <span class="mono">ملف ${escapeHtml(p.fileNumber || '—')}</span>
            <span class="dot"></span>
            <span class="mono">هوية ${escapeHtml(p.nationalId || '—')}</span>
            <span class="dot"></span>
            <span>أُضيف ${fmtDate(p.addedAt)}</span>
            ${p.notes ? `<span class="dot"></span><span>${escapeHtml(p.notes)}</span>` : ''}
          </div>
        </div>
        <div class="ticket-actions">
          <span class="badge ${badgeClass}">${badgeLabel}</span>
          ${actions}
        </div>
      </div>
    </div>
  `;
}

function openConfirm(title, text, onConfirm){
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmText').innerHTML = text;
  document.getElementById('confirmOverlay').classList.add('show');
  const btn = document.getElementById('doConfirm');
  const newBtn = btn.cloneNode(true);
  btn.parentNode.replaceChild(newBtn, btn);
  newBtn.addEventListener('click', () => {
    document.getElementById('confirmOverlay').classList.remove('show');
    onConfirm();
    render();
  });
}

/* ================= PDF EXPORT ================= */
async function exportPdf(){
  const btn = document.getElementById('exportPdfBtn');
  if(!window.html2canvas || !window.jspdf){
    alert('تعذر تحميل مكتبة تصدير PDF. تأكد من وجود اتصال إنترنت عند فتح الصفحة ثم أعد المحاولة.');
    return;
  }
  const original = btn.innerHTML;
  btn.disabled = true;
  btn.textContent = 'جاري التجهيز…';

  const all = activePatients();
  const weekly = completionStats(weekStart());
  const monthly = completionStats(monthStart());
  const rows = all.map((p,i) => `
    <tr>
      <td>${i+1}</td>
      <td>${escapeHtml(p.name)}</td>
      <td>${escapeHtml(p.fileNumber || '—')}</td>
      <td>${escapeHtml(p.nationalId || '—')}</td>
      <td>${PRIORITY_LABEL[p.priority]}</td>
      <td>${fmtDate(p.addedAt)}</td>
      <td>${escapeHtml(p.notes || '')}</td>
    </tr>
  `).join('');

  document.getElementById('exportArea').innerHTML = `
    <div class="export-head">
      <h1>${escapeHtml(state.settings.clinicName)}</h1>
      <div class="meta">${state.settings.doctorName ? escapeHtml(state.settings.doctorName) + ' — ' : ''}${state.settings.assistantName ? 'مساعد الطبيب: ' + escapeHtml(state.settings.assistantName) + ' — ' : ''}قائمة الانتظار المتبقية — ${fmtDate(Date.now())}</div>
    </div>
    <table class="export-table">
      <thead><tr><th>#</th><th>الاسم</th><th>رقم الملف</th><th>رقم الهوية</th><th>الأولوية</th><th>تاريخ الإضافة</th><th>ملاحظات</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="7">لا يوجد مرضى في قائمة الانتظار حاليًا</td></tr>'}</tbody>
    </table>
    <div class="export-summary">
      <div>عدد المتبقين: <b>${all.length}</b></div>
      <div>نسبة الإنجاز الأسبوعي: <b>${weekly.pct}%</b> (${weekly.completed} من ${weekly.completed + weekly.waiting})</div>
      <div>نسبة الإنجاز الشهري: <b>${monthly.pct}%</b> (${monthly.completed} من ${monthly.completed + monthly.waiting})</div>
    </div>
    <div class="export-footer">تصميم الموقع: تركي حسن عسيري — 2026 — 0553048757</div>
  `;

  try{
    const el = document.getElementById('exportArea');
    const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#ffffff' });
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    const imgWidth = pageWidth;
    const imgHeight = canvas.height * imgWidth / canvas.width;
    let heightLeft = imgHeight;
    let position = 0;
    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;
    while(heightLeft > 0){
      position = heightLeft - imgHeight;
      pdf.addPage();
      pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
    }
    const filename = `قائمة-الانتظار-${fmtDate(Date.now())}.pdf`;
    pdf.save(filename);
    logAction('export_pdf', `تصدير ${all.length} مريض إلى PDF`);
  }catch(err){
    console.error(err);
    alert('حدث خطأ أثناء تجهيز ملف PDF. حاول مرة أخرى.');
  }finally{
    btn.disabled = false;
    btn.innerHTML = original;
  }
}

function attachEvents(){
  document.querySelectorAll('[data-view]').forEach(btn => {
    btn.addEventListener('click', () => {
      currentView = btn.getAttribute('data-view');
      searchQuery = '';
      visibleActiveCount = 50; visibleDoneCount = 20;
      render();
    });
  });

  ['fClinicName','fDoctorName','fAssistantName'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.addEventListener('change', () => {
      const map = { fClinicName: 'clinicName', fDoctorName: 'doctorName', fAssistantName: 'assistantName' };
      const key = map[id];
      const val = el.value.trim();
      if(state.settings[key] !== val){
        state.settings[key] = val;
        saveState(state);
        logAction('edit_settings', `تحديث ${key === 'clinicName' ? 'اسم العيادة' : key === 'doctorName' ? 'اسم الطبيب' : 'اسم المساعد'} إلى: ${val || '(فارغ)'}`);
      }
      render();
    });
  });

  const searchInput = document.getElementById('searchInput');
  if(searchInput){
    searchInput.addEventListener('input', () => {
      searchQuery = searchInput.value;
      visibleActiveCount = 50; visibleDoneCount = 20;
      render();
      const el = document.getElementById('searchInput');
      if(el){ el.focus(); el.selectionStart = el.selectionEnd = el.value.length; }
    });
  }
  const loadMoreActive = document.getElementById('loadMoreActive');
  if(loadMoreActive) loadMoreActive.addEventListener('click', () => { visibleActiveCount += PAGE_STEP; render(); });
  const loadMoreDone = document.getElementById('loadMoreDone');
  if(loadMoreDone) loadMoreDone.addEventListener('click', () => { visibleDoneCount += PAGE_STEP; render(); });

  const exportPdfBtn = document.getElementById('exportPdfBtn');
  if(exportPdfBtn) exportPdfBtn.addEventListener('click', exportPdf);

  const clearLogBtn = document.getElementById('clearLogBtn');
  if(clearLogBtn) clearLogBtn.addEventListener('click', () => {
    openConfirm('حذف كل سجل الحركات', 'هل أنت متأكد من حذف كل سجل الحركات نهائيًا؟ بيانات المرضى لن تتأثر. لا يمكن التراجع عن هذا الإجراء.', () => {
      state.auditLog = [];
      saveState(state);
      logAction('clear_log', 'تم مسح كل سجل الحركات السابق');
    });
  });

  const openAdd = document.getElementById('openAddPatient');
  if(openAdd) openAdd.addEventListener('click', () => {
    selectedPriority = 'normal';
    document.getElementById('patientName').value = '';
    document.getElementById('patientFileNumber').value = '';
    document.getElementById('patientNationalId').value = '';
    document.getElementById('patientNotes').value = '';
    document.querySelectorAll('.priority-opt').forEach(o => o.classList.remove('selected'));
    document.querySelector('.priority-opt[data-priority="normal"]').classList.add('selected');
    document.getElementById('addPatientOverlay').classList.add('show');
    document.getElementById('patientName').focus();
  });
  document.querySelectorAll('.priority-opt').forEach(opt => {
    opt.addEventListener('click', () => {
      document.querySelectorAll('.priority-opt').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      selectedPriority = opt.getAttribute('data-priority');
    });
  });
  const closeModal = () => document.getElementById('addPatientOverlay').classList.remove('show');
  const cm = document.getElementById('closeModal'); if(cm) cm.addEventListener('click', closeModal);
  const ca = document.getElementById('cancelAdd'); if(ca) ca.addEventListener('click', closeModal);
  const overlay = document.getElementById('addPatientOverlay');
  if(overlay) overlay.addEventListener('click', (e) => { if(e.target === overlay) closeModal(); });
  const confirmAddBtn = document.getElementById('confirmAdd');
  if(confirmAddBtn) confirmAddBtn.addEventListener('click', () => {
    const name = document.getElementById('patientName').value.trim();
    if(!name){ document.getElementById('patientName').focus(); return; }
    const fileNumber = document.getElementById('patientFileNumber').value.trim();
    const nationalId = document.getElementById('patientNationalId').value.trim();
    const notes = document.getElementById('patientNotes').value.trim();
    state.patients.push({
      id: 'p' + Date.now() + Math.random().toString(36).slice(2,5),
      name, fileNumber, nationalId, notes,
      priority: selectedPriority,
      status: 'waiting',
      addedAt: Date.now(),
    });
    saveState(state);
    logAction('add_patient', `إضافة ${name} (${PRIORITY_LABEL[selectedPriority]})`);
    closeModal();
    render();
  });

  document.querySelectorAll('[data-action="finish"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const p = state.patients.find(x => x.id === btn.getAttribute('data-id'));
      if(!p) return;
      p.status = 'done';
      p.completedAt = Date.now();
      saveState(state);
      logAction('finish_patient', `تعليم ${p.name} كمكتمل`);
      render();
    });
  });
  document.querySelectorAll('[data-action="undo"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const p = state.patients.find(x => x.id === btn.getAttribute('data-id'));
      if(!p) return;
      p.status = 'waiting';
      delete p.completedAt;
      saveState(state);
      logAction('undo_finish', `إعادة ${p.name} لقائمة الانتظار`);
      render();
    });
  });
  document.querySelectorAll('[data-action="remove"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.getAttribute('data-id');
      const name = btn.getAttribute('data-name');
      openConfirm('حذف نهائي', `هل أنت متأكد من حذف <strong>${escapeHtml(name)}</strong> نهائيًا من القائمة؟ لا يمكن التراجع عن هذا الإجراء.`, () => {
        state.patients = state.patients.filter(x => x.id !== id);
        saveState(state);
        logAction('delete_patient', `حذف ${name} نهائيًا`);
      });
    });
  });

  const closeConfirmModal = () => document.getElementById('confirmOverlay').classList.remove('show');
  const ccm = document.getElementById('closeConfirmModal'); if(ccm) ccm.addEventListener('click', closeConfirmModal);
  const cancelConfirmBtn = document.getElementById('cancelConfirm'); if(cancelConfirmBtn) cancelConfirmBtn.addEventListener('click', closeConfirmModal);
  const confirmOverlay = document.getElementById('confirmOverlay');
  if(confirmOverlay) confirmOverlay.addEventListener('click', (e) => { if(e.target === confirmOverlay) closeConfirmModal(); });
}

(function init(){
  state = loadState();
  render();
})();
</script>
</body>
